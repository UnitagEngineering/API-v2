<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO -->
    <title>Unitag API v2 — Developer Documentation &amp; Reference</title>
    <meta
      name="description"
      content="Unitag API v2 reference: integrate QR Code generation, dynamic redirection, custom domains, campaigns and analytics into your application via a simple REST API." />
    <link rel="canonical" href="https://developers.unitag.io/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Unitag Developers" />
    <meta property="og:title" content="Unitag API v2 — Developer Documentation &amp; Reference" />
    <meta
      property="og:description"
      content="Integrate QR Code generation, dynamic redirection, custom domains, campaigns and analytics into your application via the Unitag REST API." />
    <meta property="og:url" content="https://developers.unitag.io/" />
    <!-- TODO: add og:image (1200×630, publicly fetchable — not referer-gated) for rich social cards. -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Unitag API v2 — Developer Documentation &amp; Reference" />
    <meta
      name="twitter:description"
      content="Integrate QR Code generation, dynamic redirection, custom domains, campaigns and analytics into your application via the Unitag REST API." />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Unitag Developers",
        "url": "https://developers.unitag.io/",
        "description": "Unitag API v2 developer documentation and reference.",
        "publisher": {
          "@type": "Organization",
          "name": "Unitag",
          "url": "https://unitag.io",
          "logo": "https://unitag.io/favicon.ico"
        }
      }
    </script>

    <link rel="icon" href="https://unitag.io/favicon.ico" />
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <!--
      Scalar API Reference (self-hosted).
      The page and the OpenAPI spec (./openapi.yaml) are served by us.
      The Scalar bundle is loaded from jsDelivr by default. To remove this last
      external runtime dependency, vendor the bundle locally (see DEPLOY.md) and
      point the <script src> below at ./scalar.standalone.js.
    -->
    <script id="api-reference" data-url="./openapi.yaml"></script>
    <script>
      var configuration = {
        theme: 'default',
        layout: 'modern',
        hideDownloadButton: false,
        metaData: {
          title: 'Unitag API v2',
        },
      }
      document.getElementById('api-reference').dataset.configuration =
        JSON.stringify(configuration)
    </script>
    <!-- Pin a specific version in production for reproducibility (see DEPLOY.md). -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
