worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  types {
    application/yaml yaml yml;
  }
  access_log /dev/stdout;
  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/yaml image/svg+xml;
  gzip_min_length 1024;

  server {
    # Cloud Run / containers inject $PORT (default 8080). OVH docker-compose can map to it too.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docs are public, static, and safe to cache briefly. The spec changes rarely.
    location = /openapi.yaml {
      add_header Cache-Control "public, max-age=300";
      add_header Access-Control-Allow-Origin "*";
    }

    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
